services:

  # ---------------------------------------------------------------------------
  # Socket proxies
  # Each proxy sits between its service and /var/run/docker.sock, allowing
  # only the Docker API endpoints that service actually needs. The service
  # containers no longer mount the socket directly.
  #
  # EXEC and BUILD are disabled on both proxies — these are the primary
  # escape vectors if a service container is compromised.
  # ---------------------------------------------------------------------------

  controller-proxy:
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1   # spawn, inspect, list, remove runner containers
      NETWORKS:   1   # create and remove per-job bridge networks
      IMAGES:     1   # docker pull runner image
      AUTH:       1   # docker login ghcr.io (POST /auth) for GHCR credentials
      POST:       1   # allow write operations
      DELETE:     1   # allow delete operations
      INFO:       1   # docker info (used by compose internals)
      # All others (EXEC, BUILD, PLUGINS, SYSTEM, SWARM, SECRETS) default to 0
      TIMEOUT_CONNECT: "5"
      TIMEOUT_CLIENT:  "60"
      TIMEOUT_SERVER:  "60"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks:
      - controller-proxy-net

  deployer-proxy:
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1   # docker compose up recreates the controller container
      NETWORKS:   1   # docker compose manages compose networks
      IMAGES:     1   # docker pull for digest checks
      VOLUMES:    1   # docker compose inspects volumes
      AUTH:       1   # docker login ghcr.io (POST /auth) for GHCR credentials
      POST:       1
      DELETE:     1
      INFO:       1
      # EXEC, BUILD, PLUGINS, SYSTEM, SWARM, SECRETS default to 0
      TIMEOUT_CONNECT: "5"
      TIMEOUT_CLIENT:  "60"
      TIMEOUT_SERVER:  "60"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks:
      - deployer-proxy-net

  # ---------------------------------------------------------------------------
  # Controller — manages the ephemeral runner pool
  # ---------------------------------------------------------------------------

  controller:
    image: ghcr.io/${GITHUB_ORG}/infra-runner-controller:latest
    build:
      context: .
      dockerfile: controller/Dockerfile
    restart: unless-stopped
    depends_on:
      - controller-proxy
    env_file: .env
    environment:
      RUNNER_IMAGE: ghcr.io/${GITHUB_ORG}/infra-runner:latest
      DOCKER_HOST: tcp://controller-proxy:2375
    # ── GitHub App auth (Ansible template reference) ─────────────────────────
    # When using a GitHub App instead of a static PAT, add these to the
    # environment block and mount the private key read-only.
    # Remove GITHUB_TOKEN from .env when using this path.
    #
    #   environment:
    #     GITHUB_APP_ID: "123456"
    #     GITHUB_APP_INSTALLATION_ID: "78901234"
    #     GITHUB_APP_PRIVATE_KEY_PATH: /run/secrets/github_app_key
    #   volumes:
    #     - /path/on/host/github-app.pem:/run/secrets/github_app_key:ro
    #
    # Required GitHub App permissions:
    #   Organization → Self-hosted runners: Read & write
    #   Organization → Members: Read (required alongside runners)
    #   Packages: Read (to pull runner image from GHCR if private)
    # ─────────────────────────────────────────────────────────────────────────
    tmpfs:
      - /root/.docker   # docker login writes here; ephemeral, never touches overlay fs
    healthcheck:
      test: ["CMD", "docker", "ps", "--filter", "label=runner-managed=true", "-q"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - controller-proxy-net
      - controller-net

  # ---------------------------------------------------------------------------
  # Deployer — GitOps pull loop + health endpoint
  # ---------------------------------------------------------------------------

  deployer:
    image: ghcr.io/${GITHUB_ORG}/uye-deployer:latest
    build:
      context: .
      dockerfile: deployer/Dockerfile
    restart: unless-stopped
    depends_on:
      - deployer-proxy
    env_file: .env
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-infra-runner}
      HEALTH_PORT: ${HEALTH_PORT:-8080}
      DOCKER_HOST: tcp://deployer-proxy:2375
    ports:
      - "${HEALTH_PORT:-8080}:${HEALTH_PORT:-8080}"
    tmpfs:
      - /root/.docker   # docker login writes here; ephemeral, never touches overlay fs
    volumes:
      - ./:/workspace:ro   # deployer reads compose file + .env to apply updates
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${HEALTH_PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - deployer-proxy-net
      - deployer-net

# No persistent volumes. All per-job volumes are managed by the controller.

networks:
  # Service↔proxy pairs share a /26 network. No service can reach another
  # service's proxy. Job networks live in 10.89.0.0/16 (see setup-egress-policy.sh).
  controller-proxy-net:
    ipam:
      config:
        - subnet: 172.20.0.0/26
  controller-net:
    ipam:
      config:
        - subnet: 172.20.0.64/26
  deployer-proxy-net:
    ipam:
      config:
        - subnet: 172.20.128.0/26
  deployer-net:
    ipam:
      config:
        - subnet: 172.20.128.64/26
